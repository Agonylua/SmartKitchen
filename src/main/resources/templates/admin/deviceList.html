<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>设备管理</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
        /* 添加一个简单的淡入动画，让刷新看起来更平滑 */
        .fade-update {
            animation: fadeIn 0.5s;
        }

        @keyframes fadeIn {
            from {
                opacity: 0.5;
            }
            to {
                opacity: 1;
            }
        }
    </style>
</head>
<body>
<div class="card shadow-sm">
    <div class="card-body p-0">
        <table class="table table-hover table-striped mb-0">
            <thead class="table-dark">
            <tr>
                <th>SN码</th>
                <th>设备名称</th>
                <th>类型</th>
                <th>所属家庭</th>
                <th>当前状态</th>
                <th>操作</th>
            </tr>
            </thead>

            <tbody id="deviceTableBody" th:fragment="deviceTableBody">
            <tr class="fade-update" th:each="device : ${devices}">
                <td th:text="${device.deviceSn}">SN123456</td>
                <td th:text="${device.deviceName}">米家台灯</td>
                <td>
                                    <span class="badge"
                                          th:classappend="${device.deviceType == 'SOCKET' ? 'bg-primary' : 'bg-info'}"
                                          th:text="${device.deviceType}">LIGHT</span>
                </td>
                <td th:text="${device.homeId}">Home001</td>
                <td class="json-cell">
                    <code th:text="${device.deviceData}">...</code>
                </td>
                <td>
                    <button class="btn btn-sm btn-outline-primary">查看</button>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(devices)}">
                <td class="text-center py-4 text-muted" colspan="6">暂无设备接入</td>
            </tr>
            </tbody>

        </table>
    </div>
</div>

<script>
    $(document).ready(function () {
        // 定义刷新函数
        function refreshTable() {
            // 使用 jQuery 的 load 方法
            // 意思：去请求 '/admin/devices/fragment'，把返回的内容塞进 '#deviceTableBody'
            $('#deviceTableBody').load('/admin/devices/fragment', function (response, status, xhr) {
                if (status == "error") {
                    console.log("刷新失败: " + xhr.status + " " + xhr.statusText);
                } else {
                    console.log("设备列表已更新: " + new Date().toLocaleTimeString());
                }
            });
        }

        // 开启定时器，每 3000 毫秒 (3秒) 执行一次
        setInterval(refreshTable, 3000);
    });
</script>

</body>
</html>
