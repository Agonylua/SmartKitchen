<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>智能家居管理后台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }

        .sidebar {
            min-height: 100vh;
            background-color: #343a40;
            color: white;
        }

        .nav-link {
            color: rgba(255, 255, 255, .75);
            margin-bottom: 5px;
        }

        .nav-link:hover, .nav-link.active {
            color: white;
            background-color: #0d6efd;
            border-radius: 5px;
        }

        .card-data {
            font-size: 2rem;
            font-weight: bold;
        }
    </style>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <div class="col-md-2 sidebar p-3">
            <h4 class="mb-4 text-center">🏠 Smart Admin</h4>
            <ul class="nav flex-column">
                <li class="nav-item">
                    <a class="nav-link active" th:href="@{/admin/dashboard}">📊 数据概览</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/admin/devices}">🔌 设备管理</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">👥 用户管理</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">📝 系统日志</a>
                </li>
            </ul>
        </div>

        <div class="col-md-10 p-4">
            <h2 class="mb-4">系统运行状态</h2>

            <div class="row g-4 mb-4">
                <div class="col-md-4">
                    <div class="card text-white bg-primary shadow-sm">
                        <div class="card-body">
                            <h5 class="card-title">总用户数</h5>
                            <p class="card-data" id="userCount" th:text="${userCount}">0</p>
                            <small>截止当前时间</small>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card text-white bg-success shadow-sm">
                        <div class="card-body">
                            <h5 class="card-title">在线家庭</h5>
                            <p class="card-data" id="homeCount" th:text="${homeCount}">0</p>
                            <small>活跃中的家庭组</small>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card text-white bg-warning shadow-sm">
                        <div class="card-body">
                            <h5 class="card-title">接入设备</h5>
                            <p class="card-data" id="deviceCount" th:text="${deviceCount}">0</p>
                            <small>包含所有类型设备</small>
                        </div>
                    </div>
                </div>
            </div>

            <div class="alert alert-info">
                👋 欢迎回来，管理员！系统目前运行正常。
            </div>
        </div>
    </div>
</div>
<script>
    $(document).ready(function () {
        setInterval(function () {
            // 请求刚才写的 JSON 接口
            $.get('/admin/dashboard/data', function (data) {
                // 更新数字
                $('#userCount').text(data.userCount);
                $('#homeCount').text(data.homeCount);
                $('#deviceCount').text(data.deviceCount);
            });
        }, 3000); // 3秒刷新一次
    });
</script>
</body>
</html>
