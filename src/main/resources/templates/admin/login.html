<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>后台管理登录 - 智能家居系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        .login-card {
            width: 100%;
            max-width: 400px;
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }

        .card-header {
            background-color: transparent;
            border-bottom: none;
            padding-top: 2rem;
            text-align: center;
        }

        .logo-icon {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        .form-control {
            border-radius: 8px;
            padding: 12px;
            background-color: #f8f9fa;
            border: 1px solid #eee;
        }

        .form-control:focus {
            box-shadow: none;
            border-color: #764ba2;
            background-color: #fff;
        }

        .btn-login {
            background: linear-gradient(to right, #667eea, #764ba2);
            border: none;
            border-radius: 8px;
            padding: 12px;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(118, 75, 162, 0.4);
        }
    </style>
</head>
<body>

<div class="card login-card p-4">
    <div class="card-header">
        <div class="logo-icon">🏠</div>
        <h4 class="fw-bold text-dark">Smart Admin</h4>
        <p class="text-muted small">智能家居后台管理系统</p>
    </div>

    <div class="card-body">
        <div class="alert alert-danger py-2 small text-center" role="alert" th:if="${param.error}">
            ❌ 用户名或密码错误
        </div>

        <form method="post" th:action="@{/admin/doLogin}">
            <div class="mb-3">
                <label class="form-label small text-muted" for="username">管理员账号</label>
                <input autofocus class="form-control" id="username" name="username"
                       placeholder="请输入账号" required type="text">
            </div>

            <div class="mb-4">
                <label class="form-label small text-muted" for="password">登录密码</label>
                <input class="form-control" id="password" name="password" placeholder="请输入密码"
                       required type="password">
            </div>

            <div class="d-grid gap-2">
                <button class="btn btn-primary btn-login text-white" type="submit">
                    立即登录
                </button>
            </div>
        </form>
    </div>

    <div class="card-footer text-center bg-white border-0 pb-3">
        <small class="text-muted">© 2025 SmartHome Project</small>
    </div>
</div>

</body>
</html>
